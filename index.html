<style>
  :root {
    --bg: #f7f2ea;          /* blanc de chaux */
    --ink: #211d19;         /* noir de lave */
    --ink-soft: #7a7167;
    --line: rgba(33,29,25,0.16);
    --accent: #a8502b;      /* rouille volcanique */
    --sea: #23505c;         /* mer profonde */
    --wash: #eee7db;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Jost", -apple-system, sans-serif;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 30px 24px 70px; }

  /* ===== Header éditorial ===== */
  header { text-align: center; position: relative; padding: 26px 0 8px; }
  .kicker {
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent); font-weight: 500;
  }
  .brand-title {
    font-family: "Fraunces", Georgia, serif;
    font-size: 31px; font-weight: 560; line-height: 1.15;
    margin: 10px 0 8px; letter-spacing: 0.01em;
  }
  .brand-title em { font-style: italic; font-weight: 400; }
  .brand-place {
    font-size: 11.5px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .status-dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: #4caf50; margin-left: 8px; vertical-align: 2px;
  }
  .status-dot.loading { background: #d0a94a; }
  .status-dot.err { background: #c0553f; }
  .lang-toggle { position: absolute; top: 0; right: 0; display: flex; gap: 14px; }
  .lang-toggle button {
    background: none; border: none; padding: 4px 0; cursor: pointer;
    font-family: inherit; font-size: 12px; letter-spacing: 0.18em;
    color: var(--ink-soft); border-bottom: 1px solid transparent;
  }
  .lang-toggle button.active { color: var(--ink); border-bottom-color: var(--ink); }

  /* ===== Onglets ===== */
  .tabs {
    display: flex; justify-content: center; gap: 34px;
    margin: 26px 0 6px; padding-bottom: 0;
    border-bottom: 1px solid var(--line);
  }
  .tabs button {
    background: none; border: none; cursor: pointer;
    font-family: inherit; font-size: 12.5px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-soft);
    padding: 6px 2px 14px; margin-bottom: -1px;
    border-bottom: 1px solid transparent;
  }
  .tabs button.active { color: var(--ink); border-bottom-color: var(--ink); }

  /* ===== Contenu ===== */
  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-size: 33px; font-weight: 560; line-height: 1.18;
    margin: 40px 0 8px; text-align: center;
  }
  .subtitle {
    font-family: "Fraunces", Georgia, serif; font-style: italic;
    font-size: 17.5px; font-weight: 400; color: var(--ink-soft);
    text-align: center; margin: 0 0 14px; line-height: 1.5;
  }

  #content { counter-reset: sec; }
  #content h2 { counter-increment: sec; }
  #content h2::before {
    content: "0" counter(sec, decimal-leading-zero);
    display: block;
    font-family: "Jost", sans-serif;
    font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.34em; color: var(--accent);
    margin-bottom: 7px;
  }
  h2 {
    font-family: "Fraunces", Georgia, serif;
    font-size: 23px; font-weight: 560; line-height: 1.25;
    margin: 44px 0 12px;
  }
  .text-block {
    margin: 0 0 18px; white-space: pre-line;
    color: rgba(33,29,25,0.9);
  }
  .text-block.bg-cream, .text-block.bg-sand, .text-block.bg-blue,
  .text-block.bg-green, .text-block.bg-yellow {
    padding: 16px 18px; border-radius: 3px;
  }
  .bg-cream  { background: #f1ebe0; }
  .bg-sand   { background: #ecdfd0; }
  .bg-blue   { background: #e2e9e9; }
  .bg-green  { background: #e6eadf; }
  .bg-yellow { background: #f2ead5; }

  .important {
    border: 1px solid rgba(33,29,25,0.3);
    padding: 18px 20px; margin: 22px 0;
    border-radius: 3px; white-space: pre-line;
    background: var(--wash);
    font-weight: 500;
  }
  .important.normal { font-weight: 400; }
  .important.bg-cream  { background: #f1ebe0; }
  .important.bg-sand   { background: #ecdfd0; }
  .important.bg-blue   { background: #e2e9e9; }
  .important.bg-green  { background: #e6eadf; }
  .important.bg-yellow { background: #f2ead5; }
  .important.bg-none   { background: transparent; }

  /* ===== Boutons ===== */
  .btn-wrap { margin: 6px 0 22px; }
  .btn-wrap.align-center { text-align: center; }
  .btn-wrap.align-right { text-align: right; }
  .btn-link {
    display: inline-block; text-decoration: none;
    font-family: inherit; font-size: 12px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 13px 26px; border-radius: 999px;
    transition: opacity 0.15s ease;
  }
  .btn-link:active { opacity: 0.75; }
  .btn-terracotta { background: var(--accent); color: var(--bg); }
  .btn-blue  { background: transparent; color: var(--sea); border: 1px solid var(--sea); }
  .btn-gray  { background: transparent; color: var(--ink); border: 1px solid rgba(33,29,25,0.35); }

  /* ===== Images ===== */
  .img-block { margin: 26px 0; }
  .img-block img {
    width: 100%; border-radius: 3px; display: block;
    cursor: zoom-in;
  }
  .img-block figcaption {
    font-family: "Fraunces", Georgia, serif; font-style: italic;
    font-size: 15px; color: var(--ink-soft);
    text-align: center; margin-top: 10px;
  }

  /* ===== Lightbox ===== */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(16, 13, 11, 0.94);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; cursor: zoom-out; padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 3px; }
  .lightbox .close-hint {
    position: absolute; top: 16px; right: 20px;
    color: rgba(247,242,234,0.85); font-size: 26px; line-height: 1; user-select: none;
  }

  .empty-msg {
    text-align: center; color: var(--ink-soft);
    font-family: "Fraunces", Georgia, serif; font-style: italic;
    padding: 60px 0; font-size: 17px;
  }

  footer {
    margin-top: 70px; padding-top: 26px;
    border-top: 1px solid var(--line);
    text-align: center;
  }
  .footer-name {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .footer-motto {
    font-family: "Fraunces", Georgia, serif; font-style: italic;
    font-size: 15.5px; color: var(--ink-soft); margin-top: 8px;
  }
</style>

<script>
const JSONBIN_ID = '6a4a8a26da38895dfe316b33';
const JSONBIN_ACCESS_KEY = '$2a$10$8tlzKEaPyHMqIhDLDmj6..9nz/adLAmTp8Xhh3VIcufpDly3FGCey';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

let welcome = null;
let currentPageId = null;
let currentLang = 'fr';

// Contenu par défaut affiché si jsonbin est vide ou inaccessible
const DEFAULT_WELCOME = {"pages": [{"id": "p1", "name": "🏠 i Dammusi", "title": {"fr": "Benvenuti a Pantelleria", "en": "Benvenuti a Pantelleria"}, "subtitle": {"fr": "📚 Ce guide rassemble quelques informations essentielles pour votre séjour ☀️", "en": "📚 This guide gives you some practical information for your stay ☀️"}, "sections": [{"id": "s01", "type": "heading", "content": {"fr": "📍 Où sommes-nous", "en": "📍 Our location"}}, {"id": "s02", "type": "text", "content": {"fr": "L'entrée de la propriété est située au sud de l'île dans la réserve naturelle, après le village de Scauri et Rekhale, dans le lieu-dit nommé « Salto della Vecchia » au numéro 100.", "en": "The entrance to the property is located in the south of the island in the nature reserve, after the village of Scauri and Rekhale, in the place called \"Salto della Vecchia\" at number 100."}, "bg": "cream"}, {"id": "s03", "type": "button", "label": {"fr": "🗾 Ouvrir dans Maps", "en": "🗾 Open in Maps"}, "url": "https://maps.app.goo.gl/iDn9XuiyMzUoGvVa6?g_st=ic", "color": "blue", "align": "center"}, {"id": "s04", "type": "heading", "content": {"fr": "🚗 L'accès", "en": "🚗 The entrance"}}, {"id": "s05", "type": "text", "content": {"fr": "L'entrée de la propriété se situe au N°100. À votre arrivée, retirez la corde si elle est en place, empruntez le chemin de terre sur la gauche et suivez-le pendant environ 500 mètres. Vous arriverez ensuite sur une descente en béton et herbe. Descendez sur environ 50 mètres et vous trouverez le parking sur votre droite. 🛑 Merci de vous garer ici. ✋🏻 N'empruntez pas la route en pierre en voiture.", "en": "Upon arrival at the entrance of the property at No.100, remove the rope if installed and access the dirt road on the left and follow it for about 500 meters. Then you will reach a concrete-and-grass slope. Follow it down for about 50 meters and you will find the parking area on your right. 🛑 Please park here.\n✋🏻 Do not take the stone road with your car."}, "bg": "cream"}, {"id": "s1783267022663306", "type": "image", "src": "https://i.ibb.co/wNp3g97G/f6e21c71602e.jpg", "caption": {"fr": "", "en": ""}}, {"id": "s07", "type": "heading", "content": {"fr": "🏠 i Dammusi", "en": "🏠 The Dammusi"}}, {"id": "s08", "type": "text", "content": {"fr": "Devant vous s'ouvre la vue sur la mer et en contrebas dans les oliviers, se trouve la piscine.\nÀ gauche les dammusi Palma et Limone, et derrière la piscine à droite se situent les dammusi Lentisco Grande et Lentisco Piccolo. Les dammusi Fico Grande et Fico Piccolo sont à l'entrée de la propriété.", "en": "In front of you is the view of the sea and below in the olive trees is the swimming pool.\nOn the left the dammusi Palma and Limone, and behind the pool on the right are the dammusi Lentisco Grande and Lentisco Piccolo. The dammusi Fico Grande and Fico Piccolo are at the entrance of the property."}, "bg": "cream"}, {"id": "s09", "type": "heading", "content": {"fr": "🚪 Ouvrir la porte", "en": "🚪 Open the door"}}, {"id": "s10", "type": "text", "content": {"fr": "Pour ouvrir les portes traditionnelles en bois, il faut soulever fermement l'anneau métallique bas 💪🏻🔗 et le faire coulisser verticalement dans sa rainure, tout en poussant la porte.\nDepuis l'intérieur, il suffit de soulever le montant vertical en bois situé en bas de la porte et tirer la porte vers soi.\nOn ferme le dammuso avec le loquet depuis l'intérieur, et à la clé depuis l'extérieur.", "en": "To open the traditional wooden doors, it is necessary to firmly lift the low metal ring 💪🏻🔗 and slide it vertically in its groove, while pushing the door.\nFrom the inside, simply lift the wooden upright at the bottom of the door.\nYou close the dammuso with the latch from the inside, and with the key from the outside."}, "bg": "cream"}, {"id": "s11", "type": "heading", "content": {"fr": "🍽️ La cuisine", "en": "🍽️ The kitchen"}}, {"id": "s12", "type": "text", "content": {"fr": "Le dammuso Limone 🍋 abrite la cuisine. Vous y trouverez tout le nécessaire pour cuisiner : le frigo, les plaques et le four.\nDepuis la terrasse extérieure, une petite porte donne accès au local de rangement où vous trouverez toute la vaisselle, les verres 🍷 et les équipements de cuisine. Vous y trouverez également les bacs de tri.\n♻️ Merci de bien trier vos déchets, c'est très important sur l'île.", "en": "The dammuso Limone 🍋 houses the kitchen. You will find everything you need to cook: the fridge, the hobs and the oven.\nFrom the outdoor terrace, a small door gives access to the storage room where you will find all the dishes, glasses 🍷 and kitchen equipment. You will also find the sorting bins.\n♻️ Thank you for sorting your waste, it is very important on the island."}, "bg": "cream"}, {"id": "s13", "type": "heading", "content": {"fr": "💦 L'eau", "en": "💦 Water"}}, {"id": "s14", "type": "important", "content": {"fr": "⚠️ Ne buvez pas l'eau du robinet, elle provient de citernes et n'est pas potable.", "en": "⚠️ Do not drink tap water, it comes from a cistern and is not drinkable."}, "bg": "cream", "bold": true}, {"id": "s15", "type": "text", "content": {"fr": "En revanche, dans la cuisine, le petit robinet 🚰 situé à gauche de l'évier est relié à un système de filtration : cette eau est parfaitement potable. N'hésitez pas à remplir les bouteilles en verre et à les placer au réfrigérateur. 🧊", "en": "However, in the kitchen, the small tap 🚰 to the left of the sink is connected to a filtration system: this water is perfectly potable. Feel free to fill the glass bottles and place them in the refrigerator. 🧊"}, "bg": "cream"}, {"id": "s16", "type": "important", "content": {"fr": "Un point très important : l'eau est une ressource extrêmement rare à Pantelleria 💧\nChaque dammuso possède sa propre réserve d'eau. Merci de l'utiliser avec parcimonie 🚿 (douches courtes et vérifiez que les robinets sont bien fermés et que les chasses d'eau ne coulent plus après utilisation).\n🧻 Merci de ne jeter que du papier toilette dans les WC.", "en": "A very important point: water is an extremely rare resource in Pantelleria 💧\nEach dammuso has its own water tank. Thank you for using it sparingly 🚿 (short showers, and check that the taps are closed and that the toilets aren't running after use).\n🧻 Please only throw toilet paper in the toilet."}, "bg": "cream", "bold": false}, {"id": "s17", "type": "heading", "content": {"fr": "💡 La lumière extérieure", "en": "💡 The outdoor light"}}, {"id": "s18", "type": "text", "content": {"fr": "Elle s'allume automatiquement à la tombée de la nuit 🌙. Si vous souhaitez profiter de l'obscurité pour contempler la voie lactée exceptionnelle ✨🌝, chaque dammuso a un petit tableau électrique qui contient des disjoncteurs avec l'étiquette « Terrazze Camere » ou « Luci Esterne ». Abaissez-les ou appuyez sur les boutons munis d'une LED 🟢 verte pour les éteindre.", "en": "It turns on automatically at nightfall 🌙. If you want to take advantage of the darkness to contemplate the exceptional Milky Way ✨🌝, each dammuso has a small electrical panel that contains circuit breakers with the label \"Terrazze Camere\" or \"Luci Esterne\". Lower them or press the buttons with a 🟢 green LED to turn them off."}, "bg": "cream"}, {"id": "s19", "type": "heading", "content": {"fr": "🏊‍♂️ La piscine", "en": "🏊‍♂️ The pool"}}, {"id": "s20", "type": "text", "content": {"fr": "Sous la terrasse de la piscine se trouvent les parasols 🏖️ Merci de ne jamais les laisser ouverts lorsque vous quittez la propriété, le vent 🌬️ peut se lever très rapidement.\nUn interrupteur dans le mur en pierre au niveau du palmier 🌴 permet d'allumer l'éclairage 💡 de la piscine.", "en": "Under the pool terrace are the umbrellas 🏖️ Please never leave them open when you leave the property, the wind 🌬️ can pick up very quickly.\nA switch in the stone wall at the palm tree 🌴 turns on 💡 the pool lighting."}, "bg": "cream"}, {"id": "s21", "type": "heading", "content": {"fr": "📡 Wi-Fi", "en": "📡 Wi-Fi"}}, {"id": "s22", "type": "important", "content": {"fr": "Réseau : Mokiparadisco\nMot de passe : Ferreol&Rodolphe", "en": "Network: Mokiparadisco\nPassword: Ferreol&Rodolphe"}, "bg": "sand", "bold": true}, {"id": "s23", "type": "heading", "content": {"fr": "👩🏻‍🦰 Gouvernante", "en": "👩🏻‍🦰 Housekeeper"}}, {"id": "s24", "type": "text", "content": {"fr": "Marianna (parle uniquement italien)", "en": "Marianna (speaks only Italian)"}, "bg": "cream"}, {"id": "s25", "type": "button", "label": {"fr": "📱 WhatsApp Marianna", "en": "📱 WhatsApp Marianna"}, "url": "https://wa.me/393272817202", "color": "blue", "align": "center"}]}, {"id": "p2", "name": "🏝️ L'Isola", "title": {"fr": "La figlia del vento 🌬️ ", "en": "La figlia del vento 🌬️ "}, "subtitle": {"fr": "Voici quelques conseils pour découvrir l'île ⛵️🏝️", "en": "Some addresses to enjoy the Island ⛵️🏝️"}, "sections": [{"id": "i01", "type": "heading", "content": {"fr": "📍 La carte", "en": "📍 The map"}}, {"id": "i02", "type": "text", "content": {"fr": "Voici une carte avec quelques bonnes adresses et conseils… mais surtout, prenez le temps de découvrir l'île à votre façon !", "en": "Here is a map with some good addresses and tips… but above all, take the time to discover the island in your own way!"}, "bg": "cream"}, {"id": "i03", "type": "button", "label": {"fr": "🗾 Ouvrir dans Maps", "en": "🗾 Open in Maps"}, "url": "https://www.google.com/maps/d/u/0/edit?mid=1YzQ_SphYKoDJRi-8FUcMbZxslsNraUE&usp=sharing", "color": "blue", "align": "center"}, {"id": "i04", "type": "heading", "content": {"fr": "👨🏻‍🍳 Restaurants", "en": "👨🏻‍🍳 Restaurants"}}, {"id": "i05", "type": "text", "content": {"fr": "Pour votre premier soir, nous vous recommandons de dîner à La Nicchia, à Scauri. Un excellent restaurant de pizza et de plats traditionnels pantesques.\nPuis dégustez une glace chez Gelato di Ulisse 🍦 ou prenez un verre 🍸 au Kaya Kaya, l'endroit incontournable de Scauri pour un apéritif ou un verre après le dîner.\nNotre adresse préférée pour le déjeuner est Principe e Pirata 🏴‍☠️ près de Gadir (à l'Est), avec une vue magnifique en journée. Vous pouvez également choisir La Vela, Bora Bora ou Kaya Kaya 🐟 au port de Scauri.\n🍝 Pour le dîner, nous recommandons aussi Altamarea ainsi que Rifugio Firiciakki, tous deux situés à Scauri.", "en": "For your first evening, we recommend having dinner at La Nicchia in Scauri, serving pizzas and traditional Pantellerian dishes.\nAfterwards, enjoy an ice cream at Gelato di Ulisse 🍦 or have a drink 🍸 at Kaya Kaya, Scauri's go-to spot for an aperitivo or an after-dinner cocktail.\nFor lunch, our favorite place is Principe e Pirata 🏴‍☠️, near Gadir (east side), with a beautiful daytime view. You can also choose La Vela, Bora Bora, or Kaya Kaya 🐟 at the port of Scauri.\n🍝 For dinner, we also recommend Altamarea and Rifugio Firiciakki, both located in Scauri."}, "bg": "cream"}, {"id": "s1783268030280598", "type": "heading", "content": {"fr": "🍇 Dégustation de vins", "en": "🍇 Wine tasting"}}, {"id": "s178326803158070", "type": "text", "content": {"fr": "Plongez dans la tradition de Pantelleria et laissez-vous séduire par les saveurs authentiques des vins locaux, dans le cadre enchanteur et empreint de charme d'anciens dammusi.", "en": "Immerse yourself in the tradition of Pantelleria and let yourself be seduced by the authentic flavours of the wine in the enchanting and charming setting of the ancient dammusi.\n"}, "bg": "cream"}, {"id": "s1783268033356189", "type": "button", "label": {"fr": "Abbazia San Giorgio", "en": "Abbazia San Giorgio"}, "url": "https://abbaziasangiorgio.com/en/tours", "color": "terracotta", "align": "center"}, {"id": "s1783269035413867", "type": "button", "label": {"fr": "Marco de Bartoli", "en": "Marco de Bartoli"}, "url": "https://www.marcodebartoli.com", "color": "terracotta", "align": "center"}, {"id": "i09", "type": "heading", "content": {"fr": "⛵️ Bateau traditionnel avec skipper", "en": "⛵️ Traditional boat with skipper"}}, {"id": "i10", "type": "text", "content": {"fr": "L'Oasi est u waters can be found in Gadir, Nika, Sataria, as well as Lago di Venere, where you can also enjoy the famous black mud baths.\nDon't miss the natural hammam of Grotta di Benikulà."}, "bg": "cream"}, {"id": "i19", "type": "heading", "content": {"fr": "⛰️ Randonnées", "en": "⛰️ Hiking"}}, {"id": "i20", "type": "text", "content": {"fr": "Pour une vue exceptionnelle sur toute l'île, partez tôt le matin jusqu'au Monte Gibele 🥾.\nSinon la balade de Favara Grande à la Grotta di Benikulà est merveilleuse. Monastero est aussi un site exceptionnel.", "en": "For an exceptional view of the whole island, go early in the morning to Monte Gibele 🥾.\nOtherwise the walk from Favara Grande to the Grotta di Benikulà is wonderful. Monastero is also an exceptional site."}, "bg": "cream"}, {"id": "i21", "type": "button", "label": {"fr": "Parcours", "en": "Trails"}, "url": "https://www.parconazionalepantelleria.it/Eitinerari-sentieri.php", "color": "blue", "align": "center"}, {"id": "s1783671180730353", "type": "heading", "content": {"fr": "💆🏻‍♂️ Massage", "en": "💆🏻‍♂️ Massage"}}, {"id": "s1783671184339157", "type": "text", "content": {"fr": "Roberto vous invite à ralentir, respirer et se reconnecter à l’essentiel. Entre soleil, nature et silence, chaque massage devient une parenthèse de détente, de ressourcement et de reconnexion à soi.", "en": "Roberto invites you to slow down, breathe and reconnect with the essentials. Between sun, nature and silence, each massage becomes a parenthesis of relaxation, rejuvenation and reconnection to oneself."}, "bg": "cream"}, {"id": "s1783671185140631", "type": "button", "label": {"fr": "📱 WhatsApp Roberto", "en": "📱 WhatsApp Roberto"}, "url": "https://wa.me/393894209738", "color": "blue", "align": "center"}, {"id": "s1783267195104704", "type": "heading", "content": {"fr": "☀️💨 Météo", "en": "☀️💨 Weather forecast"}}, {"id": "s1783267198390441", "type": "text", "content": {"fr": "Avant de sortir en mer ou de choisir où aller se baigner du bon côté de l' align": "center"}, {"id": "s1783265727276699", "type": "heading", "content": {"fr": "🚨 Urgences 112", "en": "🚨 Emergency 112"}}, {"id": "s1783265729859349", "type": "button", "label": {"fr": "Appel", "en": "Call"}, "url": "tel:112", "color": "gray", "align": "center"}]}]};


// Détection langue par défaut
(function() {
  let saved = null;
  try { saved = localStorage.getItem('welcome-lang'); } catch(e) {}
  if (saved === 'fr' || saved === 'en') { currentLang = saved; }
  else {
    const nav = (navigator.language || 'fr').toLowerCase();
    currentLang = nav.startsWith('fr') ? 'fr' : 'en';
  }
})();

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  try { localStorage.setItem('welcome-lang', lang); } catch(e) {}
  render();
}

function setPage(id) {
  currentPageId = id;
  renderTabs();
  render();
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  if (!welcome || !Array.isArray(welcome.pages) || welcome.pages.length === 0) {
    tabs.innerHTML = '';
    return;
  }
  tabs.innerHTML = '';
  welcome.pages.forEach(p => {
    const btn = document.createElement('button');
    btn.textContent = p.name || 'Sans nom';
    if (p.id === currentPageId) btn.className = 'active';
    btn.onclick = () => setPage(p.id);
    tabs.appendChild(btn);
  });
}

function migrateWelcome(loaded) {
  if (!loaded) return null;
  if (Array.isArray(loaded.pages)) return { pages: loaded.pages };
  const pages = [];
  if (loaded.dammusi) {
    pages.push({
      id: 'p1', name: 'Dammusi',
      title: loaded.dammusi.title || { fr: '', en: '' },
      subtitle: loaded.dammusi.subtitle || { fr: '', en: '' },
      sections: Array.isArray(loaded.dammusi.sections) ? loaded.dammusi.sections : []
    });
  }
  if (loaded.pantelleria) {
    pages.push({
      id: 'p2', name: 'Pantelleria',
      title: loaded.pantelleria.title || { fr: '', en: '' },
      subtitle: loaded.pantelleria.subtitle || { fr: '', en: '' },
      sections: Array.isArray(loaded.pantelleria.sections) ? loaded.pantelleria.sections : []
    });
  }
  return pages.length ? { pages } : null;
}

async function loadData() {
  const dot = document.getElementById('sync-dot');
  dot.className = 'status-dot loading';
  try {
    const res = await fetch(`${JSONBIN_URL}/latest`, {
      headers: { 'X-Access-Key': JSONBIN_ACCESS_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    // Priorité : contenu jsonbin s'il existe et n'est pas vide, sinon fallback DEFAULT_WELCOME
    let usedDefault = false;
    if (json.record && json.record.welcome) {
      const migrated = migrateWelcome(json.record.welcome);
      if (migrated && migrated.pages && migrated.pages.length > 0) {
        welcome = migrated;
      } else {
        welcome = DEFAULT_WELCOME;
        usedDefault = true;
      }
    } else {
      welcome = DEFAULT_WELCOME;
      usedDefault = true;
    }
    // s'assurer que chaque page a un id
    welcome.pages.forEach((p, i) => {
      if (!p.id) p.id = 'p' + (i + 1);
    });
    // sélectionner la 1ere page par défaut si aucune
    if (!currentPageId || !welcome.pages.find(p => p.id === currentPageId)) {
      currentPageId = welcome.pages[0] ? welcome.pages[0].id : null;
    }
    dot.className = 'status-dot';
    renderTabs();
    render();
  } catch (e) {
    console.error(e);
    // Erreur réseau : on affiche quand même le contenu par défaut
    welcome = DEFAULT_WELCOME;
    welcome.pages.forEach((p, i) => { if (!p.id) p.id = 'p' + (i + 1); });
    if (!currentPageId || !welcome.pages.find(p => p.id === currentPageId)) {
      currentPageId = welcome.pages[0] ? welcome.pages[0].id : null;
    }
    dot.className = 'status-dot err';
    renderTabs();
    render();
  }
}

function getLangVal(field, fallback = '') {
  if (typeof field === 'string') return field;
  if (field && typeof field === 'object') return field[currentLang] || field.fr || field.en || fallback;
  return fallback;
}

const SITE_DEFAULTS = {
  kicker: { fr: "Benvenuti — Welcome", en: "Benvenuti — Welcome" },
  title: "Dammusi *Kuddia Attalora*",
  place: "Salto della Vecchia N°100 · Pantelleria",
  motto: { fr: "piano piano — prendre le temps", en: "piano piano — slowly, slowly" },
  bg: "#f7f2ea"
};

function renderSite() {
  const s = Object.assign({}, SITE_DEFAULTS, (welcome && welcome.site) || {});
  const pick = (f) => (typeof f === 'object' && f) ? (f[currentLang] || f.fr || f.en || '') : (f || '');
  document.getElementById('site-kicker').textContent = pick(s.kicker);
  // *mots* → italique
  const titleHtml = escapeHtml(s.title || '').replace(/\*(.+?)\*/g, '<em>$1</em>');
  document.getElementById('site-title').innerHTML = titleHtml;
  document.getElementById('site-place').textContent = s.place || '';
  document.getElementById('footer-name').textContent = (s.title || '').replace(/\*/g, '');
  document.getElementById('footer-motto').textContent = pick(s.motto);
  if (typeof s.bg === 'string' && /^#[0-9a-fA-F]{6}$/.test(s.bg)) {
    document.documentElement.style.setProperty('--bg', s.bg);
  }
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============ LIGHTBOX (agrandir les images) ============
function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}
// Fermer avec la touche Échap (desktop)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

function render() {
  renderSite();
  const container = document.getElementById('content');
  const page = welcome && Array.isArray(welcome.pages)
    ? welcome.pages.find(p => p.id === currentPageId)
    : null;

  if (!page || (!page.title && (!page.sections || page.sections.length === 0))) {
    container.innerHTML = '<div class="empty-msg">Cette page n\'a pas encore de contenu.</div>';
    return;
  }

  const title = getLangVal(page.title, '');
  const subtitle = getLangVal(page.subtitle, '');
  let html = '';
  if (title) html += `<h1>${escapeHtml(title)}</h1>`;
  if (subtitle) html += `<p class="subtitle">${escapeHtml(subtitle)}</p>`;

  const sections = Array.isArray(page.sections) ? page.sections : [];
  sections.forEach(s => {
    if (s.type === 'heading') {
      const val = getLangVal(s.content);
      if (val) html += `<h2>${escapeHtml(val)}</h2>`;
    } else if (s.type === 'text') {
      const val = getLangVal(s.content);
      if (val) {
        const bg = s.bg || 'none';
        html += `<div class="text-block bg-${bg}">${escapeHtml(val)}</div>`;
      }
    } else if (s.type === 'image') {
      if (s.src) {
        const cap = getLangVal(s.caption);
        html += `<figure class="img-block"><img src="${escapeHtml(s.src)}" alt="${escapeHtml(cap)}" onclick="openLightbox(this.src)">`;
        if (cap) html += `<figcaption>${escapeHtml(cap)}</figcaption>`;
        html += `</figure>`;
      }
    } else if (s.type === 'button') {
      const label = getLangVal(s.label);
      const url = s.url || '#';
      const color = s.color || 'terracotta';
      const align = s.align || 'left';
      if (label && url && url !== '#') {
        html += `<div class="btn-wrap align-${align}"><a class="btn-link btn-${color}" href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a></div>`;
      }
    } else if (s.type === 'important') {
      const val = getLangVal(s.content);
      const bg = s.bg || 'sand';
      const isBold = s.bold !== false;
      const boldClass = isBold ? '' : ' normal';
      if (val) html += `<div class="important bg-${bg}${boldClass}">${escapeHtml(val)}</div>`;
    }
  });

  container.innerHTML = html;
}

// Refresh au retour sur l'onglet uniquement (pas d'intervalle périodique pour ne pas épuiser le quota jsonbin)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadData();
});

// Boot
loadData();
setLang(currentLang);
</script>
</body>
</html>
